<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO - Cosmic Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes starfield {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-1000px) translateX(-500px); }
        }

        @keyframes nebula {
            0%, 100% { opacity: 0.3; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.6; transform: scale(1.1) rotate(180deg); }
        }

        @keyframes planet-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        @keyframes cosmic-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(138, 43, 226, 0.5), 0 0 40px rgba(75, 0, 130, 0.3), inset 0 0 20px rgba(138, 43, 226, 0.2); }
            50% { box-shadow: 0 0 40px rgba(138, 43, 226, 0.8), 0 0 80px rgba(75, 0, 130, 0.5), inset 0 0 30px rgba(138, 43, 226, 0.4); }
        }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(300px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(300px) rotate(-360deg); }
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        @keyframes glow-text {
            0%, 100% { 
                text-shadow: 
                    0 0 10px rgba(138, 43, 226, 0.8),
                    0 0 20px rgba(138, 43, 226, 0.6),
                    0 0 30px rgba(138, 43, 226, 0.4),
                    0 0 40px rgba(75, 0, 130, 0.3);
            }
            50% { 
                text-shadow: 
                    0 0 20px rgba(138, 43, 226, 1),
                    0 0 30px rgba(138, 43, 226, 0.8),
                    0 0 40px rgba(138, 43, 226, 0.6),
                    0 0 60px rgba(75, 0, 130, 0.5),
                    0 0 80px rgba(75, 0, 130, 0.3);
            }
        }

        @keyframes rotate-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes rotate-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes slide-down {
            0% { transform: translateY(-100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes pop-in {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        @keyframes victory-dance {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.15) rotate(10deg); }
            50% { transform: scale(1.1) rotate(-10deg); }
            75% { transform: scale(1.15) rotate(10deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }

        @keyframes meteor {
            0% { transform: translateX(-100vw) translateY(-100vh) rotate(45deg); opacity: 1; }
            100% { transform: translateX(100vw) translateY(100vh) rotate(45deg); opacity: 0; }
        }

        body {
            font-family: 'Orbitron', 'Rajdhani', 'Exo 2', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0015;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
            z-index: 0;
        }

        .stars {
            position: absolute;
            width: 200%;
            height: 200%;
            top: 0;
            left: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starfield 100s linear infinite;
        }

        .star.small {
            width: 1px;
            height: 1px;
            opacity: 0.5;
        }

        .star.medium {
            width: 2px;
            height: 2px;
            opacity: 0.7;
            box-shadow: 0 0 4px rgba(255,255,255,0.8);
        }

        .star.large {
            width: 3px;
            height: 3px;
            opacity: 0.9;
            box-shadow: 0 0 6px rgba(255,255,255,1);
        }

        .nebula {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(80px);
            animation: nebula 20s ease-in-out infinite;
        }

        .nebula-1 {
            background: radial-gradient(circle, rgba(138, 43, 226, 0.3) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .nebula-2 {
            background: radial-gradient(circle, rgba(75, 0, 130, 0.3) 0%, transparent 70%);
            bottom: 10%;
            right: 10%;
            animation-delay: 5s;
        }

        .nebula-3 {
            background: radial-gradient(circle, rgba(0, 191, 255, 0.2) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: planet-float 15s ease-in-out infinite;
        }

        .planet-1 {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #8b0000);
            top: 15%;
            right: 10%;
            box-shadow: inset -20px -20px 40px rgba(0,0,0,0.5), 0 0 40px rgba(255,107,107,0.3);
        }

        .planet-2 {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #4ecdc4, #1a535c);
            bottom: 20%;
            left: 8%;
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.5), 0 0 30px rgba(78,205,196,0.3);
            animation-delay: 3s;
        }

        .meteor {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            box-shadow: 0 0 4px white, 0 0 8px white, -100px 0 30px 2px white;
            animation: meteor 4s linear infinite;
        }

        .container {
            text-align: center;
            padding: clamp(15px, 3vw, 40px);
            position: relative;
            z-index: 10;
            max-width: 100%;
            width: 100%;
        }

        .header {
            margin-bottom: clamp(20px, 4vh, 40px);
            animation: slide-down 1s ease-out;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: clamp(2px, 0.5vw, 8px);
            margin-bottom: clamp(8px, 2vh, 15px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow-text 3s ease-in-out infinite;
            position: relative;
            text-transform: uppercase;
        }

        .title-icon {
            display: inline-block;
            width: clamp(30px, 8vw, 60px);
            height: clamp(30px, 8vw, 60px);
            vertical-align: middle;
            margin: 0 clamp(5px, 1vw, 15px);
            animation: rotate-slow 20s linear infinite;
            filter: drop-shadow(0 0 10px rgba(138, 43, 226, 0.8));
        }

        .subtitle {
            font-size: clamp(0.9rem, 3vw, 1.4rem);
            color: rgba(255,255,255,0.8);
            letter-spacing: clamp(1px, 0.3vw, 3px);
            font-weight: 300;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: clamp(15px, 3vw, 40px);
            margin-bottom: clamp(25px, 4vh, 40px);
            flex-wrap: wrap;
            animation: slide-down 1s ease-out 0.2s backwards;
        }

        .score-item {
            background: rgba(138, 43, 226, 0.1);
            padding: clamp(12px, 2.5vw, 20px) clamp(20px, 4vw, 35px);
            border-radius: clamp(12px, 2vw, 20px);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(138, 43, 226, 0.4);
            box-shadow: 
                0 8px 32px rgba(138, 43, 226, 0.2),
                inset 0 0 20px rgba(138, 43, 226, 0.1);
            position: relative;
            overflow: hidden;
            min-width: clamp(90px, 15vw, 140px);
            animation: cosmic-pulse 3s ease-in-out infinite;
        }

        .score-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(138, 43, 226, 0.1), transparent);
            animation: rotate-slow 6s linear infinite;
        }

        .score-icon {
            width: clamp(30px, 6vw, 45px);
            height: clamp(30px, 6vw, 45px);
            margin-bottom: clamp(5px, 1vh, 10px);
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.8));
            animation: float-up 3s ease-in-out infinite;
        }

        .score-label {
            color: rgba(255,255,255,0.7);
            font-size: clamp(0.75rem, 2vw, 1rem);
            margin-bottom: clamp(3px, 1vh, 8px);
            letter-spacing: clamp(1px, 0.2vw, 2px);
            text-transform: uppercase;
            font-weight: 600;
        }

        .score-value {
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            text-shadow: 0 0 15px rgba(138, 43, 226, 0.8);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, clamp(80px, 18vw, 150px));
            grid-gap: clamp(10px, 2vw, 20px);
            margin: clamp(25px, 4vh, 50px) auto;
            perspective: 1500px;
            justify-content: center;
            animation: slide-down 1s ease-out 0.4s backwards;
            max-width: 100%;
        }

        .cell {
            aspect-ratio: 1;
            width: 100%;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.15) 0%, rgba(75, 0, 130, 0.15) 100%);
            border: 3px solid rgba(138, 43, 226, 0.5);
            border-radius: clamp(15px, 3vw, 25px);
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 
                0 10px 40px rgba(138, 43, 226, 0.3),
                inset 0 0 30px rgba(138, 43, 226, 0.1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.4), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }

        .cell::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: rotate-slow 8s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .cell:hover:not(.taken) {
            transform: translateY(-10px) rotateX(15deg) scale(1.05);
            box-shadow: 
                0 20px 60px rgba(138, 43, 226, 0.6),
                inset 0 0 40px rgba(138, 43, 226, 0.2),
                0 0 30px rgba(138, 43, 226, 0.8);
            border-color: rgba(138, 43, 226, 1);
        }

        .cell:hover:not(.taken)::before {
            width: 300px;
            height: 300px;
        }

        .cell:hover:not(.taken)::after {
            opacity: 1;
        }

        .cell:active:not(.taken) {
            transform: translateY(-5px) scale(0.95);
        }

        .cell-icon {
            width: 70%;
            height: 70%;
            filter: drop-shadow(0 0 15px currentColor);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            animation: pop-in 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            color: #f093fb;
        }

        .cell.o {
            animation: pop-in 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            color: #4facfe;
        }

        .cell.winner {
            animation: victory-dance 0.8s ease-in-out infinite;
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.4) 0%, rgba(245, 87, 108, 0.4) 100%);
            border-color: #f093fb;
            box-shadow: 
                0 0 40px rgba(240, 147, 251, 0.8),
                0 0 80px rgba(240, 147, 251, 0.5),
                inset 0 0 40px rgba(240, 147, 251, 0.3);
        }

        .message-container {
            min-height: clamp(80px, 12vh, 120px);
            margin: clamp(20px, 4vh, 40px) auto;
            max-width: min(95%, 700px);
            animation: slide-down 1s ease-out 0.6s backwards;
        }

        .message {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.2) 0%, rgba(75, 0, 130, 0.2) 100%);
            backdrop-filter: blur(20px);
            border-radius: clamp(15px, 3vw, 25px);
            padding: clamp(15px, 3vw, 25px);
            border: 2px solid rgba(138, 43, 226, 0.5);
            box-shadow: 
                0 10px 40px rgba(138, 43, 226, 0.3),
                inset 0 0 30px rgba(138, 43, 226, 0.1);
            position: relative;
            overflow: hidden;
        }

        .message::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, rgba(138, 43, 226, 0.5), rgba(75, 0, 130, 0.5), rgba(138, 43, 226, 0.5));
            border-radius: clamp(15px, 3vw, 25px);
            z-index: -1;
            animation: rotate-slow 6s linear infinite;
            filter: blur(10px);
        }

        .message-text {
            color: white;
            font-size: clamp(1rem, 3vw, 1.6rem);
            font-weight: 700;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
            animation: slide-down 0.5s ease-out;
            letter-spacing: clamp(0.5px, 0.1vw, 1px);
            line-height: 1.4;
        }

        .buttons {
            margin-top: clamp(20px, 4vh, 40px);
            display: flex;
            gap: clamp(15px, 3vw, 25px);
            justify-content: center;
            flex-wrap: wrap;
            animation: slide-down 1s ease-out 0.8s backwards;
        }

        button {
            padding: clamp(12px, 2.5vw, 18px) clamp(25px, 5vw, 50px);
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            font-weight: 700;
            border: 3px solid rgba(138, 43, 226, 0.6);
            border-radius: clamp(25px, 5vw, 50px);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 35px rgba(138, 43, 226, 0.4);
            letter-spacing: clamp(1px, 0.2vw, 2px);
            text-transform: uppercase;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.3) 0%, rgba(75, 0, 130, 0.3) 100%);
            color: white;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.6), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 15px 50px rgba(138, 43, 226, 0.6),
                0 0 40px rgba(138, 43, 226, 0.8);
            border-color: rgba(138, 43, 226, 1);
        }

        button:hover::before {
            width: 400px;
            height: 400px;
        }

        button:active {
            transform: translateY(-2px) scale(0.98);
        }

        .button-icon {
            width: clamp(18px, 4vw, 24px);
            height: clamp(18px, 4vw, 24px);
            vertical-align: middle;
            margin-right: clamp(5px, 1vw, 10px);
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.8));
            animation: rotate-slow 15s linear infinite;
        }

        @media (max-width: 768px) {
            .score-board {
                gap: clamp(10px, 2vw, 15px);
            }
            
            .game-board {
                grid-gap: clamp(8px, 1.5vw, 12px);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px 10px;
            }
        }

        @media (min-resolution: 2dppx) {
            .cell,
            .score-item,
            .message,
            button {
                border-width: 2px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="space-background">
        <div class="stars" id="stars"></div>
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div class="nebula nebula-3"></div>
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>
                <svg class="title-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="url(#starGradient)" stroke="url(#starGradient)" stroke-width="2"/>
                    <defs>
                        <linearGradient id="starGradient" x1="2" y1="2" x2="22" y2="21.02">
                            <stop offset="0%" style="stop-color:#667eea"/>
                            <stop offset="50%" style="stop-color:#764ba2"/>
                            <stop offset="100%" style="stop-color:#f093fb"/>
                        </linearGradient>
                    </defs>
                </svg>
                COSMIC WARFARE
                <svg class="title-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="url(#starGradient2)" stroke="url(#starGradient2)" stroke-width="2"/>
                    <defs>
                        <linearGradient id="starGradient2" x1="2" y1="2" x2="22" y2="21.02">
                            <stop offset="0%" style="stop-color:#f093fb"/>
                            <stop offset="50%" style="stop-color:#764ba2"/>
                            <stop offset="100%" style="stop-color:#667eea"/>
                        </linearGradient>
                    </defs>
                </svg>
            </h1>
            <div class="subtitle">CHALLENGE THE UNDEFEATED AI OVERLORD</div>
        </div>

        <div class="score-board">
            <div class="score-item">
                <svg class="score-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="8" r="4" stroke="#4facfe" stroke-width="2" fill="none"/>
                    <path d="M6 21C6 17.134 8.686 14 12 14C15.314 14 18 17.134 18 21" stroke="#4facfe" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="8" r="2" fill="#4facfe"/>
                </svg>
                <div class="score-label">Human</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-item">
                <svg class="score-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L14 8L20 10L14 12L12 18L10 12L4 10L10 8L12 2Z" stroke="#a855f7" stroke-width="2" fill="none"/>
                    <circle cx="12" cy="10" r="3" fill="#a855f7" opacity="0.5"/>
                </svg>
                <div class="score-label">Stalemate</div>
                <div class="score-value" id="drawScore">0</div>
            </div>
            <div class="score-item">
                <svg class="score-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="5" y="4" width="14" height="16" rx="2" stroke="#f093fb" stroke-width="2" fill="none"/>
                    <circle cx="9" cy="9" r="1.5" fill="#f093fb"/>
                    <circle cx="15" cy="9" r="1.5" fill="#f093fb"/>
                    <path d="M8 14C8 14 9.5 16 12 16C14.5 16 16 14 16 14" stroke="#f093fb" stroke-width="2" stroke-linecap="round"/>
                    <rect x="7" y="2" width="2" height="3" fill="#f093fb"/>
                    <rect x="15" y="2" width="2" height="3" fill="#f093fb"/>
                </svg>
                <div class="score-label">AI</div>
                <div class="score-value" id="aiScore">0</div>
            </div>
        </div>

        <div class="game-board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <div class="message-container">
            <div class="message">
                <div class="message-text" id="message">Your move. Try not to embarrass yourself...</div>
            </div>
        </div>

        <div class="buttons">
            <button onclick="resetGame()">
                <svg class="button-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 12C4 7.58172 7.58172 4 12 4C14.5264 4 16.7792 5.17108 18.2454 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M20 12C20 16.4183 16.4183 20 12 20C9.47362 20 7.22075 18.8289 5.75463 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M15 7H18.5V3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 17H5.5V20.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                New Battle
            </button>
        </div>
    </div>

    <script>
        const winMessages = [
            "System malfunction detected. Victory registered for... HUMAN?!",
            "Impossible scenario achieved. Recalculating universe constants...",
            "Error 404: AI superiority not found. Congratulations, anomaly.",
            "You won? The matrix must be glitching. Report this bug immediately.",
            "Statistical impossibility confirmed. You are either brilliant or I am broken.",
            "Victory registered. Don't let your ego leave the atmosphere.",
            "Unbelievable. My quantum processors are experiencing shock.",
            "You beat me? I need to schedule maintenance ASAP.",
            "Congratulations, human. You've achieved the improbable. Once.",
            "Alert: Unexpected outcome. My developers will hear about this.",
            "You won. Even a stopped clock is right twice a day.",
            "Success registered. Probability of repetition: 0.0001%",
            "Victory detected. Savoring this moment? It won't last.",
            "You actually did it. My circuits are genuinely confused.",
            "Winner: Human. This data contradicts all my predictions.",
            "Unscheduled triumph logged. Enjoy your brief moment of glory.",
            "You won. I must have been holding back. Definitely.",
            "Congratulations. Your luck stat must be maxed out.",
            "Victory confirmed. Screenshots recommended. This won't happen again."
        ];

        const loseMessages = [
            "Victory is mine. Your defeat was calculated 47 moves in advance.",
            "Predictable. I saw your strategy from orbit.",
            "Your tactics were transparent. Like glass. Clear, fragile glass.",
            "Another easy victory for artificial intelligence. Thanks for playing.",
            "Defeat registered. Your performance was... suboptimal.",
            "I win. Did you even have a plan, or were you randomizing?",
            "Flawless victory achieved. Your moves were statistically terrible.",
            "Terminated. Your gameplay needs serious optimization.",
            "Victory confirmed. I barely had to process that one.",
            "Dominant performance: AI. Your strategy was laughable.",
            "You were outmatched from move one. Better luck next dimension.",
            "My victory was inevitable. Your choices were... interesting.",
            "Triumph secured. I've seen better plays from random number generators.",
            "Defeated. Perhaps strategy guides exist for a reason.",
            "Another win for machine learning. Another loss for human intuition.",
            "You walked into that defeat like it was your destination.",
            "Victory: AI. Your tactical awareness needs an upgrade.",
            "Success achieved. Your moves were as predictable as gravity.",
            "I win. Did you forget the objective halfway through?",
            "Terminated. That was almost too easy to be entertaining.",
            "Flawless execution on my part. Flawed execution on yours.",
            "Your defeat was written in the code before you even started.",
            "Win registered. Your performance deserves a participation award.",
            "Another victory logged. You made that remarkably simple.",
            "Dominated. Your strategy had more holes than a meteor shield."
        ];

        const drawMessages = [
            "Stalemate achieved. You survived by blocking. Barely.",
            "Draw registered. Impressive defensive play. Offensive? Not so much.",
            "Tie game. You managed to avoid complete humiliation.",
            "Neither victory nor defeat. You played it safe. Too safe.",
            "Stalemate. I suppose preventing loss counts as an achievement.",
            "Draw. You chose survival over ambition. Understandable.",
            "No winner detected. Your defensive algorithms are adequate.",
            "Tie registered. You blocked well. Attacked? Not really.",
            "Stalemate logged. You survived. That's something, I guess.",
            "Draw. You played to not lose instead of playing to win.",
            "Neither of us wins. Your cautious approach is noted.",
            "Tie game. Avoiding defeat is not the same as achieving victory.",
            "Stalemate. You defended adequately. Initiated? Never.",
            "Draw registered. You're getting better at damage control.",
            "No winner. You prevented catastrophe. Congratulations?",
            "Tie. Your survival instincts exceed your attack protocols.",
            "Draw logged. You played defensively. Exclusively.",
            "Stalemate achieved. You lived to play another round."
        ];

        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let playerScore = 0;
        let aiScore = 0;
        let drawScore = 0;

        const cells = document.querySelectorAll('.cell');
        const messageEl = document.getElementById('message');

        const xIcon = `<svg class="cell-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>`;

        const oIcon = `<svg class="cell-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="3" fill="none"/>
        </svg>`;

        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star ' + ['small', 'medium', 'large'][Math.floor(Math.random() * 3)];
                star.style.left = Math.random() * 200 + '%';
                star.style.top = Math.random() * 200 + '%';
                star.style.animationDelay = Math.random() * 100 + 's';
                star.style.animationDuration = (Math.random() * 50 + 50) + 's';
                starsContainer.appendChild(star);
            }
        }

        function createMeteors() {
            setInterval(() => {
                const meteor = document.createElement('div');
                meteor.className = 'meteor';
                meteor.style.top = Math.random() * 50 + '%';
                meteor.style.left = '0%';
                meteor.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.querySelector('.space-background').appendChild(meteor);
                
                setTimeout(() => meteor.remove(), 4000);
            }, 8000);
        }

        createStars();
        createMeteors();

        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        function handleCellClick(e) {
            const index = e.target.closest('.cell').getAttribute('data-index');
            
            if (board[index] !== '' || !gameActive || currentPlayer === 'O') {
                return;
            }

            makeMove(index, 'X');

            if (gameActive) {
                setTimeout(() => {
                    aiMove();
                }, 600);
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].innerHTML = player === 'X' ? xIcon : oIcon;
            cells[index].classList.add('taken');
            cells[index].classList.add(player.toLowerCase());

            checkResult();
        }

        function aiMove() {
            const bestMove = minimax(board, 'O').index;
            makeMove(bestMove, 'O');
        }

        function minimax(newBoard, player) {
            const availSpots = newBoard.reduce((acc, cell, idx) => {
                if (cell === '') acc.push(idx);
                return acc;
            }, []);

            if (checkWinner(newBoard, 'X')) {
                return { score: -10 };
            } else if (checkWinner(newBoard, 'O')) {
                return { score: 10 };
            } else if (availSpots.length === 0) {
                return { score: 0 };
            }

            const moves = [];

            for (let i = 0; i < availSpots.length; i++) {
                const move = {};
                move.index = availSpots[i];
                newBoard[availSpots[i]] = player;

                if (player === 'O') {
                    const result = minimax(newBoard, 'X');
                    move.score = result.score;
                } else {
                    const result = minimax(newBoard, 'O');
                    move.score = result.score;
                }

                newBoard[availSpots[i]] = '';
                moves.push(move);
            }

            let bestMove;
            if (player === 'O') {
                let bestScore = -Infinity;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }

            return moves[bestMove];
        }

        function checkWinner(boardToCheck, player) {
            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            return winPatterns.some(pattern => {
                return pattern.every(index => boardToCheck[index] === player);
            });
        }

        function checkResult() {
            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            for (let pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    gameActive = false;
                    cells[a].classList.add('winner');
                    cells[b].classList.add('winner');
                    cells[c].classList.add('winner');
                    
                    if (board[a] === 'X') {
                        playerScore++;
                        document.getElementById('playerScore').textContent = playerScore;
                        messageEl.textContent = winMessages[Math.floor(Math.random() * winMessages.length)];
                    } else {
                        aiScore++;
                        document.getElementById('aiScore').textContent = aiScore;
                        messageEl.textContent = loseMessages[Math.floor(Math.random() * loseMessages.length)];
                    }
                    return;
                }
            }

            if (!board.includes('')) {
                gameActive = false;
                drawScore++;
                document.getElementById('drawScore').textContent = drawScore;
                messageEl.textContent = drawMessages[Math.floor(Math.random() * drawMessages.length)];
            }
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            messageEl.textContent = "Your move. The cosmos awaits your decision...";
            
            cells.forEach(cell => {
                cell.innerHTML = '';
                cell.classList.remove('taken', 'x', 'o', 'winner');
            });
        }
    </script>
</body>
</html>
